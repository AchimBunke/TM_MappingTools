name: Deploy to GitHub Pages

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [ main ]

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Publish .NET Core Project
      run: dotnet publish TM_MappingTools.csproj -c Release -o Prerender/output --nologo

    # Fix base href BEFORE prerendering so Puppeteer loads assets correctly
    - name: Fix base href before prerender
      run: |
        sed -i 's|<base href="/" />|<base href="/TM_MappingTools/" />|g' Prerender/output/wwwroot/index.html

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install prerender dependencies
      working-directory: Prerender/output/wwwroot
      run: |
        cat > package.json << 'EOF'
        {
          "name": "prerender",
          "version": "1.0.0",
          "dependencies": {
            "puppeteer": "^24.0.0",
            "serve": "^14.0.0"
          }
        }
        EOF
        npm install

    - name: Create prerender script
      working-directory: Prerender/output/wwwroot
      run: |
        cat > prerender.mjs << 'EOF'
        import puppeteer from 'puppeteer';
        import { spawn } from 'child_process';
        import { writeFileSync, mkdirSync } from 'fs';
        import { join } from 'path';

        const server = spawn('npx', ['serve', '.', '-p', '5500', '--no-clipboard'], {
          stdio: 'ignore',
          detached: true
        });

        await new Promise(r => setTimeout(r, 3000));

        const browser = await puppeteer.launch({
          args: ['--no-sandbox', '--disable-setuid-sandbox'],
          headless: true
        });

        const routes = [
          '/',
        ];

        for (const route of routes) {
          console.log(`Prerendering ${route}...`);
          const page = await browser.newPage();

          // Log browser console so we can see what Blazor is doing
          page.on('console', msg => console.log('  [browser]', msg.text()));
          page.on('pageerror', err => console.log('  [page error]', err.message));

          await page.goto(`http://localhost:5500${route}`, {
            waitUntil: 'networkidle0',
            timeout: 60000
          });

          // Wait until the loading spinner is GONE from #app
          // Replace 'nav' with any element your app renders after boot
          try {
            await page.waitForFunction(
              () => {
                const app = document.getElementById('app');
                // Check that loading spinner svg is no longer the only child
                return app && !app.querySelector('svg.loading-progress');
              },
              { timeout: 30000 }
            );
            console.log('  ✅ Blazor finished rendering');
          } catch (e) {
            console.log('  ⚠️ Timed out waiting for Blazor - saving whatever is rendered');
          }

          const html = await page.content();
          await page.close();

          const outDir = join('.', route === '/' ? '' : route);
          mkdirSync(outDir, { recursive: true });
          writeFileSync(join(outDir, 'index.html'), html);
          console.log(`  ✅ Done: ${route}`);
        }

        await browser.close();
        server.kill();
        console.log('Prerendering complete.');
        EOF

    - name: Prerender Blazor client
      working-directory: Prerender/output/wwwroot
      run: node prerender.mjs

    # Only strip the injected WASM bootstrap script that Puppeteer captures,
    # base href is already correct from the earlier fix
    - name: Strip WASM inline bootstrap from prerendered HTML
      run: |
        find Prerender/output/wwwroot -name "*.html" | while read htmlFile; do
          sed -i 's/<script type="text\/javascript">var Module; window.__wasmmodulecallback__(); delete window.__wasmmodulecallback__;<\/script><script src="_framework\/dotnet.10.0.5.js" defer="" integrity="sha256-SWZOE2EsCqc\/7dPgJrcFqUvVvdeJ9cipeZ2NFMC9v2s=" crossorigin="anonymous"><\/script>//g' "$htmlFile"
        done

    - name: Copy index.html to 404.html
      run: cp Prerender/output/wwwroot/index.html Prerender/output/wwwroot/404.html

    - name: Add .nojekyll file
      run: touch Prerender/output/wwwroot/.nojekyll

    - name: Commit wwwroot to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages
        FOLDER: Prerender/output/wwwroot
